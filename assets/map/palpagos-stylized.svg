  <text x="52" y="1548" fill="#cbe9e5" fill-opacity=".43" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="14" letter-spacing="2">PALBREED SCHEMATIC • MARKER COORDINATES ARE AUTHORITATIVE</text>
