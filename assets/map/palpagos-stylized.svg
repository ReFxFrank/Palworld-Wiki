<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">Palpagos Islands schematic basemap</title>
  <desc id="desc">An original coordinate-aligned, stylized basemap for positioning PalBreed map markers. It is not a copy of the in-game map.</desc>
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07171c"/>
      <stop offset="0.48" stop-color="#0a2429"/>
      <stop offset="1" stop-color="#071419"/>
    </linearGradient>
    <radialGradient id="oceanGlow" cx="61%" cy="45%" r="63%">
      <stop offset="0" stop-color="#1a5960" stop-opacity=".28"/>
      <stop offset=".72" stop-color="#0b343a" stop-opacity=".08"/>
      <stop offset="1" stop-color="#041014" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grass" x1="0" y1="0" x2=".8" y2="1">
      <stop stop-color="#8ab77d"/>
      <stop offset="1" stop-color="#335f55"/>
    </linearGradient>
    <linearGradient id="forest" x1=".15" y1="0" x2=".8" y2="1">
      <stop stop-color="#5e9b75"/>
      <stop offset="1" stop-color="#244b48"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#d5eff0"/>
      <stop offset=".42" stop-color="#8ebbc1"/>
      <stop offset="1" stop-color="#496a73"/>
    </linearGradient>
    <linearGradient id="desert" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ddb778"/>
      <stop offset="1" stop-color="#8e6845"/>
    </linearGradient>
    <linearGradient id="volcano" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ad6b4e"/>
      <stop offset=".52" stop-color="#6f3d39"/>
      <stop offset="1" stop-color="#342f33"/>
    </linearGradient>
    <linearGradient id="sakura" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#d394aa"/>
      <stop offset="1" stop-color="#765b78"/>
    </linearGradient>
    <linearGradient id="feybreak" x1=".2" y1="0" x2=".9" y2="1">
      <stop stop-color="#9f9658"/>
      <stop offset=".48" stop-color="#72623c"/>
      <stop offset="1" stop-color="#3a473e"/>
    </linearGradient>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#a8ded8" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <pattern id="minorGrid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M25 0H0V25" fill="none" stroke="#a8ded8" stroke-opacity=".018" stroke-width="1"/>
    </pattern>
    <filter id="landShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="11" result="blur"/>
      <feOffset dy="8" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.02 0 0 0 0 0.07 0 0 0 0 0.08 0 0 0 .75 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <style>
      .land{stroke:#b9d7c3;stroke-opacity:.3;stroke-width:3;stroke-linejoin:round}
      .ridge{fill:none;stroke:#e7f5dc;stroke-opacity:.16;stroke-width:4;stroke-linecap:round}
      .river{fill:none;stroke:#73cbd0;stroke-opacity:.5;stroke-width:7;stroke-linecap:round}
      .coast-glow{fill:none;stroke:#6dd8cc;stroke-opacity:.09;stroke-width:15;filter:url(#softGlow)}
      .label{font:600 21px system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:3px;fill:#d9eeee;fill-opacity:.72;text-anchor:middle}
      .sub{font:500 14px system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:2px;fill:#c5dedd;fill-opacity:.5;text-anchor:middle}
    </style>
  </defs>

  <rect width="1600" height="1600" fill="url(#ocean)"/>
  <rect width="1600" height="1600" fill="url(#oceanGlow)"/>
  <path d="M93 1288C250 1160 302 975 492 870S785 647 946 468s300-215 478-287" fill="none" stroke="#43c7c4" stroke-opacity=".055" stroke-width="44" filter="url(#softGlow)"/>
  <path d="M218 1480c193-74 283-52 401-112 141-71 155-198 276-258 162-80 322 4 496-93" fill="none" stroke="#5ed8d0" stroke-opacity=".045" stroke-width="25" filter="url(#softGlow)"/>
  <rect width="1600" height="1600" fill="url(#minorGrid)"/>
  <rect width="1600" height="1600" fill="url(#grid)"/>

